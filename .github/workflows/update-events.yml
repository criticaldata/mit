name: Update Events Table

on:
  push:
    branches: [main]
    paths:
      - "data/events/**"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install pyyaml
      - name: Regenerate events table
        run: python scripts/generate_events_table.py > data/events/README.md
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events/README.md
          git diff --cached --quiet || git commit -m "chore: regenerate events table [skip ci]"
          git push
