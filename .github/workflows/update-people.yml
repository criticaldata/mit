name: Update People Table

on:
  push:
    branches: [main]
    paths:
      - "data/people/**"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install pyyaml
      - name: Regenerate people table
        run: python scripts/generate_people_table.py > data/people/README.md
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/people/README.md
          git diff --cached --quiet || git commit -m "chore: regenerate people table [skip ci]"
          git push
