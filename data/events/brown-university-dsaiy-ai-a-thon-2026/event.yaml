description: The AI-a-thon brings together high school students, teachers, data scientists, and healthcare professionals for
  a hands-on, collaborative experience exploring how artificial intelligence is used in healthcare. Working in cross-disciplinary
  teams, participants tackle real-world activities that reveal how AI works, where it can go wrong, and why bias, accuracy,
  and verification matter. Just as importantly, the event centers youth voices, inviting students to share what they think
  about AI and how it may shape their futures, communities, and careers. March 19-20th, 2025
