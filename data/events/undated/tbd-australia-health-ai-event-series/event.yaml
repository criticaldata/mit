title: 'TBD: Australia Health AI Event Series'
type: other
status: prospect
country: Australia
description: 'We are writing to invite your support for a groundbreaking series of Health AI workshops across Australia that
  will reimagine how artificial intelligence is developed, validated, and deployed in healthcare. These workshops will combine
  technical skill-building (LLM-a-thons, Health AI Systems Thinking for Equity sessions) with critical reflection on AI''s
  societal impacts, centering voices typically excluded from technology development: First Nations communities, youth, patients,
  multicultural populations, and rural/remote practitioners. Rather than imposing solutions, our approach emphasizes co-design
  and participatory innovation, building agency and capacity within communities most affected by AI deployment while addressing
  urgent challenges like healthcare workforce shortages, data sovereignty, climate impacts on health, and algorithmic bias.


  The workshops address a critical gap as private AI companies increasingly shape Australia''s health systems with minimal
  attention to ethics, equity, or community values. The event will bring together diverse stakeholders—from Aboriginal and
  Torres Strait Islander elders and youth to clinicians, computer scientists, medical students, bioethicists, and digital
  health researchers—to examine concrete questions: How do we safeguard against bias in clinical algorithms? What does data
  sovereignty mean for First Nations communities? How can AI support rather than displace rural healthcare access? What guardrails
  prevent unintended harms? By starting with reflection and reimagination before technical implementation, and by training
  youth as "double agents" who can navigate existing power structures while plotting transformative alternatives, we aim to
  ensure that Australia''s AI future is shaped through us, not done to us. We seek support for venues, catering, participant
  stipends (particularly for community members who would otherwise lose wages), and materials. Your sponsorship would directly
  enable communities to claim their seat at the table where AI''s future in Australian healthcare is being decided.'
