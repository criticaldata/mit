bio: |
  Physician-researcher and epidemiologist from Fukushima Medical University. Studies critical care outcomes using causal inference methods and predictive modeling to bridge data and bedside decisions.
research_interests: |
  Critical care epidemiology; causal inference (potential outcomes, DAGs, TTE); predictive model evaluation (discrimination, calibration, decision curves); AKI and ICU outcomes; patient-centered outcome utilities.
