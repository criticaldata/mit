description: |
  MIMIC-DEID Next is a modernized de-identification pipeline for clinical notes,
  built on top of the MIMIC-IV dataset and designed to replace legacy rule-based
  approaches with current NLP and language model tooling. It provides researchers
  with a reproducible, extensible framework for removing protected health information
  from clinical text at scale. Distributed through PhysioNet, it aims to become the
  community standard for clinical note de-identification in open research settings.
